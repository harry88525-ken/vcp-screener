name: VCP daily screen

on:
  # 觸發改由 Cloudflare Worker「vcp-l1-cron」準時打 workflow_dispatch（07:00 UTC=15:00 台北，週一~五）。
  # GitHub 內建 schedule 會被降級延遲（曾延 4hr）+ 會與 CF 雙重觸發，故移除。見 ops/cf-cron/。
  # 備援：若 CF 失效，L3 任務 vcp-l3-deepdive 16:30 防呆會偵測 leaders.json 非今天並自行觸發 L1。
  workflow_dispatch:
    inputs:
      limit:
        description: "限制 universe 檔數（留空＝全市場）"
        required: false
        default: ""

permissions:
  contents: write                # 把選股結果 commit 回 repo

concurrency:
  group: vcp-daily
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Unit tests
        env:
          PYTHONUTF8: "1"
        run: python -m pytest tests/ -q

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run screener
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_SLEEP_SEC: "2.4"       # Backer 1600/hr → 2.4s/req 安全
          VCP_INCREMENTAL_COMMIT: "1"    # 每 120 交易日 commit+push 快取（逾時不蒸發、可續跑）
          PYTHONUTF8: "1"
        run: |
          ARGS="--full"
          if [ -n "${{ github.event.inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"; fi
          echo "Running: python -m src.screener $ARGS"
          python -m src.screener $ARGS

      - name: L3 deep-dive LEADERS
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUTF8: "1"
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then echo "no ANTHROPIC_API_KEY — skip L3"; exit 0; fi
          ids=$(python -c "import json;print(' '.join(x['stock_id'] for x in json.load(open('docs/leaders.json',encoding='utf-8'))['LEADERS']))")
          for id in $ids; do echo "L3 deep-dive $id"; python -m src.deep_dive "$id" || true; done
          python -m src.report docs/leaders.json docs/index.html   # 重建報告以掛上深挖連結

      - name: Commit results
        run: |
          git pull --rebase --autostash || true   # 增量 commit 已推遠端，先同步再推
          git add docs/ data/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "data: VCP screen $(date -u +%Y-%m-%d)"
            git push
          fi
      # Pages 已改「分支自動部署」(legacy, main /docs)：push 後 GitHub 自動發布。
      # 原 deploy-pages job(Actions 部署) 已移除——因 L3 直接 push 不會觸發 Actions 部署，
      # 改分支來源後 L1/L3 任何 push 都會自動上線（2026-06-15）。
